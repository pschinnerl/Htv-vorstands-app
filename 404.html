<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <title>HTV Vorstands-App</title>
  <script>
    // GitHub Pages SPA-Trick: unbekannte Pfade zur index.html weiterleiten
    // Pfadsegmente die erhalten bleiben: 1 (= /Htv-vorstands-app)
    var segmentsToKeep = 1;
    var l = window.location;
    l.replace(
      l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
      l.pathname.split('/').slice(0, 1 + segmentsToKeep).join('/') + '/?/' +
      l.pathname.slice(1).split('/').slice(segmentsToKeep).join('/').replace(/&/g, '~and~') +
      (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
      l.hash
    );
  </script>
</head>
<body></body>
</html>
